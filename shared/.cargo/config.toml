[env]
ZENOH_PICO_FRAG_MAX_SIZE = "4096"
ZENOH_PICO_BATCH_UNICAST_SIZE = "2048"
ZENOH_PICO_BATCH_MULTICAST_SIZE = "2048"
# Note: this variable is not used by the pio builder (`cargo build --features pio`)
ESP_IDF_VERSION = "v5.3.3"
# Uncomment this if you have moved the target dir by setting CARGO_TARGET_DIR or similar.
# Required for now due to embuild limitations.
CARGO_WORKSPACE_DIR = { value = "", relative = true }
ESP_IDF_SYS_ROOT_CRATE = "crates/esp-idf-config"
ESP_IDF_SDKCONFIG_DEFAULTS = "crates/esp-idf-config/sdkconfig.defaults"
