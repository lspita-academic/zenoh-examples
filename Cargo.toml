[workspace]
resolver = "3"
members = ["examples/*"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.93"

[workspace.dependencies]
critical-section = { version = "1.1", default-features = false, features = [
  "std"
] }
embassy-executor = { version = "0.7", features = ["arch-std", "executor-thread"] }
embassy-time = "0.4"
esp-idf-svc = { version = "0.51", features = [
  "embassy-sync",
  "embassy-time-driver"
] }
log = "0.4"
# Disable zenoh features that require the ring library as a dependency, since it does not support the RISC-V architecture
# https://docs.rs/zenoh/1.7.2/zenoh/#features
zenoh = { version = "1.7.2", default-features = false, features = [
  "auth_pubkey",
  "auth_usrpwd",
  "transport_compression",
  "transport_multilink",
  # "transport_quic", # requires ring
  # "transport_quic_datagram",  # requires ring
  "transport_tcp",
  # "transport_tls",  # requires ring
  "transport_udp",
  # "transport_unixsock-stream", # processes pipes not useful, just one peer per esp
  "transport_ws"
] }

[profile.dev]
opt-level = "z"
debug = true  # Symbols are nice, and they don't increase the size on Flash

[profile.release]
opt-level = "s"
