name: zenoh-examples-hello-zenoh

x-service: &service
  build: &service-build
    context: ../..
    dockerfile: containers/rust-crate-bin/Containerfile
    args: &service-build-args
      CRATE_PATH: examples/hello-esp

services:
  hello-esp:
    <<: *service
    build:
      <<: *service-build
      args:
        <<: *service-build-args
        BIN_NAME: hello-esp
